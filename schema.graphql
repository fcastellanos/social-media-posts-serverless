type Photo {
  id: ID
  url: String
}

type PropertyRef {
  id: ID!
  address: String
  title: String
}

type Property {
  id: ID!
  title: String
  address: String
  latitude: Float
  longitude: Float
}

type Post {
  id: ID!
  title: String
  body: String
  photos: [Photo!]!
  property: PropertyRef
  scheduled_at: String
}

type PropertiesResult {
  items: [Property!]!
}

type PostsResult {
  items: [Post!]!
}

type Query {
  listProperties: PropertiesResult!
  getProperty(id: ID!): Property
  listPosts: PostsResult!
  getPost(id: ID!): Post
}
