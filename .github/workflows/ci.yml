name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 for JavaScript actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Make test-results dir
        run: mkdir -p test-results

      - name: Run unit tests (produce junit)
        run: npm run test:ci -- --reporter=junit --outputFile=./test-results/junit-${{ matrix.node-version }}.xml

      - name: Show junit file
        if: always()
        run: |
          echo "=== junit contents ==="
          ls -l test-results || true
          cat test-results/junit-${{ matrix.node-version }}.xml || true

      - name: Upload test results (vitest JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-${{ matrix.node-version }}
          path: ./test-results/junit-${{ matrix.node-version }}.xml
